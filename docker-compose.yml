services:
  app:
    build: .
    container_name: keyguard
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file:
      - .env
    volumes:
      - keyguard-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  keyguard-data:
